# DigitalOcean App Platform Specification
# ملف إعدادات منصة DigitalOcean App Platform
# https://docs.digitalocean.com/products/app-platform/reference/app-spec/

name: atheer-server

services:
  - name: api
    github:
      repo: ahmedaliahmed775/Atheer_Server
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DB_HOST
        value: ${db.HOSTNAME}
      - key: DB_PORT
        value: ${db.PORT}
      - key: DB_NAME
        value: ${db.DATABASE}
      - key: DB_USER
        value: ${db.USERNAME}
      - key: DB_PASSWORD
        value: ${db.PASSWORD}
      - key: JWT_SECRET
        type: SECRET
        value: "EWJhbGciOiJIUzI1NiIsInR5cCI6Replace-With-Secure-Secret"
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ADMIN_EMAIL
        value: admin@atheer.app
      - key: ADMIN_PASSWORD
        type: SECRET
        value: "Replace-With-Secure-Password"

databases:
  - name: db
    engine: PG
    version: "16"
    size: db-s-dev-database
    num_nodes: 1
